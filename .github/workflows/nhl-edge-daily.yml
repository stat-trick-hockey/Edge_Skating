name: NHL EDGE — Daily Skating Distance

on:
  schedule:
    # Runs at 09:00 UTC daily (≈ 5 AM ET, well after overnight data refresh)
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override run date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""

permissions:
  contents: write   # push CSVs + raw JSON back to repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for Pages deploy

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────
  # 1.  Fetch data + generate HTML / CSVs
  # ──────────────────────────────────────────
  build:
    name: Fetch & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git log works in archive links

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests pandas pillow

      - name: Determine run date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "run_date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NHL EDGE scraper (HTML + CSV)
        run: |
          python nhl_edge_skating_distance.py \
            --outdir  data/edge_skating_distance \
            --docsdir docs \
            --date    "${{ steps.date.outputs.run_date }}"

      - name: Generate Instagram PNG card
        run: |
          python edge_instagram_card.py \
            --date   "${{ steps.date.outputs.run_date }}" \
            --outdir docs/instagram

      - name: Rebuild archive index page
        run: python scripts/build_archive_index.py --docsdir docs

      - name: Commit all outputs to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || \
            git commit -m "chore: NHL EDGE data + IG card — ${{ steps.date.outputs.run_date }} [skip ci]"
          git push

      # Upload the docs/ folder as the Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Upload Instagram card as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-ig-card-${{ steps.date.outputs.run_date }}
          path: docs/instagram/${{ steps.date.outputs.run_date }}_edge_skating.png
          retention-days: 30

  # ──────────────────────────────────────────
  # 2.  Deploy to GitHub Pages
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
